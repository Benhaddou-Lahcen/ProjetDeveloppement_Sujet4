# ═══════════════════════════════════════════════════════════════════════════════
# STAFF SERVICE CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

server:
  port: 8082

spring:
  application:
    name: staff-service

  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_staff
    username: postgres
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.hospital.staff: DEBUG

