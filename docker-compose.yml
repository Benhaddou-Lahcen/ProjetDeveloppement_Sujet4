      timeout: 5s
      retries: 5
    networks:
      - hospital-network

  postgres-medical-records:
    image: postgres:15-alpine
    container_name: postgres-medical-records
    environment:
      POSTGRES_DB: hospital_medical_records
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
