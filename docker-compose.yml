# ═══════════════════════════════════════════════════════════════════════════════
# NETWORKS
# WHY custom network: Allows services to communicate by container name
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  hospital-network:
    driver: bridge

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES
# WHY named volumes: Data persists between container restarts
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  postgres-patients-data:
  postgres-staff-data:
  postgres-appointments-data:
  postgres-medical-records-data:
  postgres-auth-data:
  postgres-users-data:
  postgres-consultations-data:

  # volume optionnel si vous souhaitez persister les modèles ML
  # ml-models-data:

